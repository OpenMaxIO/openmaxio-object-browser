version: '3.8'

services:
  openmaxio:
    image: openmaxio-object-browser:<version>
    ports:
      - "9090:9090"
    environment:
      - CONSOLE_MINIO_SERVER=http[s]://your_minio_instance:9000
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - openmaxio
    restart: unless-stopped